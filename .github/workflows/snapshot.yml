name: Snapshot

on:
  schedule:
    - cron: '0 */4 * * *' # Every 4 hours
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  tofu-outputs:
    uses: nelsong6/pipeline-templates/.github/workflows/tofu-outputs-template.yml@main
    with:
      storage_account: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
      state_key: plant-agent.tfstate
    secrets: inherit

  generate-and-commit:
    name: Generate snapshot.db and commit
    needs: tofu-outputs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Azure Login via OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Install snapshot dependencies
        working-directory: ./snapshot
        run: npm ci

      - name: Resolve Cosmos DB endpoint from App Config
        id: cosmos
        run: |
          ENDPOINT=$(az appconfig kv show \
            --endpoint "${{ vars.AZURE_APP_CONFIG_ENDPOINT }}" \
            --auth-mode login \
            --key "plants/cosmos_db_endpoint" \
            --query value -o tsv)
          echo "::add-mask::$ENDPOINT"
          echo "endpoint=$ENDPOINT" >> $GITHUB_OUTPUT

      - name: Generate SQLite snapshot
        working-directory: ./snapshot
        env:
          COSMOS_DB_ENDPOINT: ${{ steps.cosmos.outputs.endpoint }}
          COSMOS_DB_DATABASE_NAME: ${{ fromJSON(needs.tofu-outputs.outputs.outputs_json).cosmos_db_database_name }}
          STORAGE_ACCOUNT_ENDPOINT: ${{ fromJSON(needs.tofu-outputs.outputs.outputs_json).storage_account_endpoint }}
        run: |
          rm -f ../frontend/public/snapshot.db
          node generate-snapshot.js --output ../frontend/public/snapshot.db

      - name: Commit snapshot.db to repo
        # The commit triggers build-and-deploy.yml (matches its frontend/**
        # paths filter), which rebuilds the Docker image with the new snapshot
        # baked into frontend/dist and rolls the pod via ArgoCD.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/snapshot.db
          git diff --cached --quiet || git commit -m "Update snapshot.db"
          git push
